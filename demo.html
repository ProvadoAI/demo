<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Provado AI — Interactive Demo</title>
  <style>
    :root {
      --bg: #0b1020;
      --panel: #141a2e;
      --accent: #5b8cff;
      --accent-2: #7df2c1;
      --text: #e8ecf6;
      --muted: #9aa6c2;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: radial-gradient(1200px 600px at 30% -10%, #1b2547 0%, var(--bg) 55%);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    main {
      flex: 1;
      max-width: 760px;
      margin: 0 auto;
      padding: 64px 24px;
      width: 100%;
    }
    h1 {
      font-size: clamp(30px, 5vw, 44px);
      margin: 0 0 12px;
      background: linear-gradient(90deg, #fff, var(--accent));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    p.lead { color: var(--muted); font-size: 17px; margin: 0 0 32px; }
    .panel {
      background: var(--panel);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 16px;
      padding: 28px;
      margin-bottom: 24px;
    }
    label { display: block; font-size: 14px; color: var(--muted); margin-bottom: 8px; }
    input[type="text"] {
      width: 100%;
      padding: 12px 14px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.14);
      background: #0e1426;
      color: var(--text);
      font-size: 16px;
    }
    .greeting { margin-top: 16px; font-size: 20px; color: var(--accent-2); min-height: 26px; }
    .row { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
    .count { font-size: 48px; font-weight: 700; color: var(--accent-2); min-width: 70px; text-align: center; }
    button {
      background: var(--accent);
      color: #07122e;
      border: none;
      border-radius: 10px;
      padding: 10px 18px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.15s ease;
    }
    button.ghost { background: transparent; color: var(--text); border: 1px solid rgba(255,255,255,0.18); }
    button:hover { transform: translateY(-2px); }
    footer { text-align: center; color: var(--muted); font-size: 14px; padding: 24px; }
  </style>
</head>
<body>
  <main>
    <h1>Interactive Demo</h1>
    <p class="lead">A self-contained HTML page with a couple of tiny interactive widgets. No build step, no dependencies.</p>

    <section class="panel">
      <label for="name">Your name</label>
      <input type="text" id="name" placeholder="Type your name…" autocomplete="off" />
      <div class="greeting" id="greeting"></div>
    </section>

    <section class="panel">
      <div class="row">
        <button class="ghost" onclick="change(-1)">−</button>
        <div class="count" id="count">0</div>
        <button onclick="change(1)">+</button>
        <button class="ghost" onclick="reset()">Reset</button>
      </div>
    </section>
  </main>

  <footer>Built as a demo · <span id="year"></span> Provado AI</footer>

  <script>
    const nameInput = document.getElementById('name');
    const greeting = document.getElementById('greeting');
    nameInput.addEventListener('input', () => {
      const v = nameInput.value.trim();
      greeting.textContent = v ? `Hello, ${v}! 👋` : '';
    });

    let value = 0;
    const countEl = document.getElementById('count');
    function change(delta) { value += delta; countEl.textContent = value; }
    function reset() { value = 0; countEl.textContent = value; }

    document.getElementById('year').textContent = new Date().getFullYear();
  </script>
</body>
</html>
